<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ARA Bot</title>
  <!-- Vendored pin of @daily-co/daily-js@0.83.1 (no CDN). -->
  <script src="./vendor/daily-0.83.1.js"></script>
</head>
<body>
  <div id="status">initializing...</div>
  <script>
    /** @type {import('@daily-co/daily-js').DailyCall | null} */
    let call = null;
    let audioContext = null;
    let outputGain = null;
    let customTrack = null;
    let customTrackName = null;
    const captureNodes = new Map();

    const SAMPLE_RATE = 48000;
    // ~42.7ms @ 48kHz — power-of-2 friendly for worklet batching
    const CHUNK_SAMPLES = 2048;

    /** Prefer this remote participant's audio when multiple people speak. */
    let activeSpeakerId = null;
    /** Fallback when Daily has not yet reported an active speaker. */
    let soleRemoteSessionId = null;

    /** Next absolute AudioContext time for seamless TTS scheduling. */
    let nextPlayTime = 0;
    /** Active BufferSource nodes so barge-in can stop them. */
    const activeSources = new Set();
    let pendingPlaybackEnds = 0;
    let playbackGeneration = 0;
    let workletReady = false;

    const CAPTURE_WORKLET = `
class AraCaptureProcessor extends AudioWorkletProcessor {
  constructor(options) {
    super();
    this.chunkSamples = (options.processorOptions && options.processorOptions.chunkSamples) || 2048;
    this.buffer = new Float32Array(this.chunkSamples);
    this.offset = 0;
  }

  process(inputs) {
    const input = inputs[0] && inputs[0][0];
    if (!input) return true;

    let i = 0;
    while (i < input.length) {
      const space = this.chunkSamples - this.offset;
      const take = Math.min(space, input.length - i);
      this.buffer.set(input.subarray(i, i + take), this.offset);
      this.offset += take;
      i += take;

      if (this.offset >= this.chunkSamples) {
        const copy = this.buffer.slice(0);
        this.port.postMessage(copy.buffer, [copy.buffer]);
        this.buffer = new Float32Array(this.chunkSamples);
        this.offset = 0;
      }
    }
    return true;
  }
}
registerProcessor('ara-capture-processor', AraCaptureProcessor);
`;

    async function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
      }
      if (audioContext.state === 'suspended') {
        await audioContext.resume();
      }
      if (!workletReady) {
        const blob = new Blob([CAPTURE_WORKLET], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        try {
          await audioContext.audioWorklet.addModule(url);
          workletReady = true;
        } finally {
          URL.revokeObjectURL(url);
        }
      }
      return audioContext;
    }

    function refreshSoleRemote() {
      if (!call) {
        soleRemoteSessionId = null;
        return;
      }
      const remoteIds = Object.values(call.participants())
        .filter((p) => p && !p.local)
        .map((p) => p.session_id);
      soleRemoteSessionId = remoteIds.length === 1 ? remoteIds[0] : null;
    }

    function shouldCaptureSession(sessionId) {
      if (activeSpeakerId) return sessionId === activeSpeakerId;
      if (soleRemoteSessionId) return sessionId === soleRemoteSessionId;
      // Multiple remotes, no active-speaker yet: accept all (better than silence)
      return true;
    }

    async function initBot(config) {
      const { roomUrl, userName, token } = config;
      document.getElementById('status').textContent = 'joining...';

      call = window.Daily.createCallObject({
        subscribeToTracksAutomatically: true,
        dailyConfig: { micAudioMode: 'speech' },
      });

      call.on('joined-meeting', () => {
        document.getElementById('status').textContent = 'joined';
        refreshSoleRemote();
        window.__araOnEvent?.({ type: 'joined-meeting' });
      });

      call.on('left-meeting', () => {
        window.__araOnEvent?.({ type: 'left-meeting' });
      });

      call.on('participant-joined', (ev) => {
        refreshSoleRemote();
        window.__araOnEvent?.({
          type: 'participant-joined',
          participant: ev.participant?.user_name,
          sessionId: ev.participant?.session_id,
        });
      });

      call.on('participant-left', () => {
        refreshSoleRemote();
      });

      call.on('active-speaker-change', (ev) => {
        const peerId = ev.activeSpeaker?.peerId || ev.activeSpeaker?.session_id || null;
        const localId = call?.participants()?.local?.session_id;
        if (peerId && peerId !== localId) {
          activeSpeakerId = peerId;
        }
        window.__araOnEvent?.({
          type: 'active-speaker-change',
          participant: peerId,
        });
      });

      call.on('track-started', async (ev) => {
        if (!ev.participant?.local && ev.track?.kind === 'audio') {
          window.__araOnEvent?.({
            type: 'track-started',
            participant: ev.participant?.user_name,
          });
          await startCaptureRemote(ev.participant.session_id, ev.track);
        }
      });

      call.on('track-stopped', (ev) => {
        const sessionId = ev.participant?.session_id;
        if (sessionId && captureNodes.has(sessionId)) {
          const nodes = captureNodes.get(sessionId);
          nodes.worklet?.disconnect();
          nodes.source.disconnect();
          nodes.mute?.disconnect();
          captureNodes.delete(sessionId);
        }
      });

      call.on('error', (ev) => {
        window.__araOnEvent?.({ type: 'error', message: ev.errorMsg });
      });

      const joinOpts = {
        url: roomUrl,
        userName,
        startVideoOff: true,
        startAudioOff: true,
      };
      if (token) joinOpts.token = token;

      await call.join(joinOpts);
      await setupOutputTrack();
      return { ok: true };
    }

    async function setupOutputTrack() {
      const ctx = await ensureAudioContext();
      outputGain = ctx.createGain();

      const dest = ctx.createMediaStreamDestination();
      outputGain.connect(dest);

      customTrack = dest.stream.getAudioTracks()[0];
      customTrackName = await call.startCustomTrack({
        track: customTrack,
        trackName: 'ara-voice',
        audioMode: 'speech',
      });

      nextPlayTime = 0;
      window.__araOnEvent?.({ type: 'output-track-ready' });
    }

    async function startCaptureRemote(sessionId, track) {
      if (captureNodes.has(sessionId)) return;

      const ctx = await ensureAudioContext();
      const source = ctx.createMediaStreamSource(new MediaStream([track]));
      const worklet = new AudioWorkletNode(ctx, 'ara-capture-processor', {
        numberOfInputs: 1,
        numberOfOutputs: 1,
        channelCount: 1,
        processorOptions: { chunkSamples: CHUNK_SAMPLES },
      });

      worklet.port.onmessage = (ev) => {
        if (!shouldCaptureSession(sessionId)) return;
        const float32 = new Float32Array(ev.data);
        const pcm = float32ToPcm16(float32);
        window.__araOnRemoteAudio?.(uint8ToBase64(pcm));
      };

      // Silent sink keeps the graph alive without audible feed-through
      const mute = ctx.createGain();
      mute.gain.value = 0;
      source.connect(worklet);
      worklet.connect(mute);
      mute.connect(ctx.destination);
      captureNodes.set(sessionId, { source, worklet, mute });
      refreshSoleRemote();
    }

    function uint8ToBase64(bytes) {
      let binary = '';
      const chunkSize = 8192;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    function float32ToPcm16(float32Array) {
      const buf = new Uint8Array(float32Array.length * 2);
      const view = new DataView(buf.buffer);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      }
      return buf;
    }

    function pcm16ToFloat32(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

      const samples = bytes.length / 2;
      const out = new Float32Array(samples);
      const view = new DataView(bytes.buffer);
      for (let i = 0; i < samples; i++) {
        out[i] = view.getInt16(i * 2, true) / 32768;
      }
      return out;
    }

    /**
     * Schedule PCM16 48kHz audio on the AudioContext timeline.
     * Returns remaining buffered playback seconds after this chunk.
     */
    async function publishAudio(base64Pcm) {
      if (!audioContext || !outputGain) return { remainingSec: 0 };
      if (audioContext.state === 'suspended') await audioContext.resume();

      const float32 = pcm16ToFloat32(base64Pcm);
      if (float32.length === 0) {
        return { remainingSec: Math.max(0, nextPlayTime - audioContext.currentTime) };
      }

      const buffer = audioContext.createBuffer(1, float32.length, SAMPLE_RATE);
      buffer.copyToChannel(float32, 0);

      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(outputGain);

      const now = audioContext.currentTime;
      const startAt = Math.max(now + 0.02, nextPlayTime);
      source.start(startAt);
      nextPlayTime = startAt + buffer.duration;

      const generation = playbackGeneration;
      pendingPlaybackEnds++;
      activeSources.add(source);

      source.onended = () => {
        activeSources.delete(source);
        if (generation !== playbackGeneration) return;
        pendingPlaybackEnds = Math.max(0, pendingPlaybackEnds - 1);
        if (pendingPlaybackEnds === 0 && nextPlayTime <= audioContext.currentTime + 0.05) {
          window.__araOnEvent?.({ type: 'playback-done' });
        }
      };

      return { remainingSec: Math.max(0, nextPlayTime - now) };
    }

    /** Stop all scheduled TTS immediately (barge-in). */
    async function stopPlayback() {
      playbackGeneration++;
      for (const source of activeSources) {
        try { source.stop(); } catch (_) {}
        try { source.disconnect(); } catch (_) {}
      }
      activeSources.clear();
      pendingPlaybackEnds = 0;
      if (audioContext) {
        nextPlayTime = audioContext.currentTime;
      } else {
        nextPlayTime = 0;
      }
      window.__araOnEvent?.({ type: 'playback-stopped' });
    }

    async function leaveRoom() {
      await stopPlayback();

      for (const [, nodes] of captureNodes) {
        nodes.worklet?.disconnect();
        nodes.source.disconnect();
        nodes.mute?.disconnect();
      }
      captureNodes.clear();

      if (customTrackName) {
        await call?.stopCustomTrack(customTrackName);
      }
      await call?.leave();
      await audioContext?.close();
      audioContext = null;
      workletReady = false;
    }

    window.__araBot = { initBot, publishAudio, stopPlayback, leaveRoom };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ARA Bot</title>
  <script src="https://unpkg.com/@daily-co/daily-js"></script>
</head>
<body>
  <div id="status">initializing...</div>
  <script>
    /** @type {import('@daily-co/daily-js').DailyCall | null} */
    let call = null;
    let audioContext = null;
    let outputGain = null;
    let customTrack = null;
    let customTrackName = null;
    const captureNodes = new Map();

    const SAMPLE_RATE = 48000;
    const CHUNK_SAMPLES = Math.floor(SAMPLE_RATE * 0.2); // 200ms

    async function initBot(config) {
      const { roomUrl, userName } = config;
      document.getElementById('status').textContent = 'joining...';

      call = window.Daily.createCallObject({
        subscribeToTracksAutomatically: true,
        dailyConfig: { micAudioMode: 'speech' },
      });

      call.on('joined-meeting', () => {
        document.getElementById('status').textContent = 'joined';
        window.__araOnEvent?.({ type: 'joined-meeting' });
      });

      call.on('left-meeting', () => {
        window.__araOnEvent?.({ type: 'left-meeting' });
      });

      call.on('participant-joined', (ev) => {
        window.__araOnEvent?.({
          type: 'participant-joined',
          participant: ev.participant?.user_name,
        });
      });

      call.on('track-started', async (ev) => {
        if (!ev.participant?.local && ev.track?.kind === 'audio') {
          window.__araOnEvent?.({
            type: 'track-started',
            participant: ev.participant?.user_name,
          });
          await startCaptureRemote(ev.participant.session_id, ev.track);
        }
      });

      call.on('error', (ev) => {
        window.__araOnEvent?.({ type: 'error', message: ev.errorMsg });
      });

      await call.join({
        url: roomUrl,
        userName,
        startVideoOff: true,
        startAudioOff: true,
      });

      await setupOutputTrack();
      return { ok: true };
    }

    async function setupOutputTrack() {
      audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
      outputGain = audioContext.createGain();

      const dest = audioContext.createMediaStreamDestination();
      outputGain.connect(dest);

      customTrack = dest.stream.getAudioTracks()[0];
      customTrackName = await call.startCustomTrack({
        track: customTrack,
        trackName: 'ara-voice',
        audioMode: 'speech',
      });

      window.__araOnEvent?.({ type: 'output-track-ready' });
    }

    async function startCaptureRemote(sessionId, track) {
      if (captureNodes.has(sessionId)) return;

      const ctx = audioContext || new AudioContext({ sampleRate: SAMPLE_RATE });
      if (!audioContext) audioContext = ctx;

      const source = ctx.createMediaStreamSource(new MediaStream([track]));
      const processor = ctx.createScriptProcessor(CHUNK_SAMPLES, 1, 1);

      let sampleBuffer = [];

      processor.onaudioprocess = (e) => {
        const input = e.inputBuffer.getChannelData(0);
        sampleBuffer.push(...input);

        while (sampleBuffer.length >= CHUNK_SAMPLES) {
          const chunk = sampleBuffer.splice(0, CHUNK_SAMPLES);
          const pcm = float32ToPcm16(chunk);
          window.__araOnRemoteAudio?.(uint8ToBase64(pcm));
        }
      };

      source.connect(processor);
      processor.connect(ctx.destination);
      captureNodes.set(sessionId, { source, processor });
    }

    function uint8ToBase64(bytes) {
      let binary = '';
      const chunkSize = 8192;
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary);
    }

    function float32ToPcm16(float32Array) {
      const buf = new Uint8Array(float32Array.length * 2);
      const view = new DataView(buf.buffer);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      }
      return buf;
    }

    function pcm16ToFloat32(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

      const samples = bytes.length / 2;
      const out = new Float32Array(samples);
      const view = new DataView(bytes.buffer);
      for (let i = 0; i < samples; i++) {
        out[i] = view.getInt16(i * 2, true) / 32768;
      }
      return out;
    }

    /** Play PCM16 48kHz audio through the custom output track. */
    async function publishAudio(base64Pcm) {
      if (!audioContext || !outputGain) return;

      const float32 = pcm16ToFloat32(base64Pcm);
      const buffer = audioContext.createBuffer(1, float32.length, SAMPLE_RATE);
      buffer.copyToChannel(float32, 0);

      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(outputGain);
      source.start();
    }

    async function leaveRoom() {
      for (const [, nodes] of captureNodes) {
        nodes.processor.disconnect();
        nodes.source.disconnect();
      }
      captureNodes.clear();

      if (customTrackName) {
        await call?.stopCustomTrack(customTrackName);
      }
      await call?.leave();
      await audioContext?.close();
    }

    window.__araBot = { initBot, publishAudio, leaveRoom };
  </script>
</body>
</html>
